<!DOCTYPE html>
<html lang="en">
   <head>
      <title>Bootstrap Typography example</title>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
      <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
   </head>
   <body>
      <div class="container">
         <h1>Where will you take a sick boat? To the Docks!</h1>
         <h1 class="display-1">Mu</h1>
         <h1 class="display-2">Ha</h1>
         <h1 class="display-3">Ha</h1>
         <h1 class="display-4">Ha</h1>
      </div>
      <div class="container">
         <h1>*laughs maniacally*</h1>
         <small class="text-muted">you can't see me!</small>
         <dl>
            <dt>Coffee</dt>
            <dd>White hot drink</dd>
         </dl>
      </div>
   </body>
</html>
